<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1b3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#162040;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bgGrad)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="220" height="750" fill="#0d1526"/>
  <rect x="220" y="0" width="1" height="750" fill="#1e3a5f"/>

  <!-- Sidebar glow accent -->
  <rect x="0" y="0" width="4" height="750" fill="url(#blueGrad)" filter="url(#glow)"/>

  <!-- Logo area -->
  <rect x="16" y="16" width="188" height="50" rx="8" fill="#0a1628"/>
  <circle cx="40" cy="41" r="13" fill="url(#blueGrad)" filter="url(#glow)"/>
  <text x="58" y="46" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Admin Panel</text>

  <!-- Admin badge -->
  <rect x="58" y="52" width="50" height="14" rx="7" fill="#1d4ed8" opacity="0.4"/>
  <text x="83" y="62" font-family="system-ui,sans-serif" font-size="8" fill="#93c5fd" text-anchor="middle">ENTERPRISE</text>

  <!-- Nav items -->
  <rect x="8" y="88" width="204" height="36" rx="8" fill="url(#blueGrad)" opacity="0.2"/>
  <rect x="8" y="88" width="4" height="36" rx="2" fill="url(#blueGrad)" filter="url(#glow)"/>
  <rect x="22" y="96" width="18" height="18" rx="3" fill="#1d4ed8"/>
  <text x="48" y="111" font-family="system-ui,sans-serif" font-size="13" fill="#93c5fd" font-weight="600">Overview</text>

  <rect x="22" y="130" width="18" height="18" rx="3" fill="#1e3a5f"/>
  <text x="48" y="144" font-family="system-ui,sans-serif" font-size="13" fill="#6b7280">Users</text>

  <rect x="22" y="162" width="18" height="18" rx="3" fill="#1e3a5f"/>
  <text x="48" y="176" font-family="system-ui,sans-serif" font-size="13" fill="#6b7280">Agents</text>

  <rect x="22" y="194" width="18" height="18" rx="3" fill="#1e3a5f"/>
  <text x="48" y="208" font-family="system-ui,sans-serif" font-size="13" fill="#6b7280">Billing</text>

  <rect x="22" y="226" width="18" height="18" rx="3" fill="#1e3a5f"/>
  <text x="48" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#6b7280">Wallets</text>

  <rect x="22" y="258" width="18" height="18" rx="3" fill="#1e3a5f"/>
  <text x="48" y="272" font-family="system-ui,sans-serif" font-size="13" fill="#6b7280">Oracles</text>

  <rect x="22" y="290" width="18" height="18" rx="3" fill="#1e3a5f"/>
  <text x="48" y="304" font-family="system-ui,sans-serif" font-size="13" fill="#6b7280">API Keys</text>

  <rect x="22" y="322" width="18" height="18" rx="3" fill="#1e3a5f"/>
  <text x="48" y="336" font-family="system-ui,sans-serif" font-size="13" fill="#6b7280">Audit Logs</text>

  <rect x="22" y="354" width="18" height="18" rx="3" fill="#1e3a5f"/>
  <text x="48" y="368" font-family="system-ui,sans-serif" font-size="13" fill="#6b7280">Settings</text>

