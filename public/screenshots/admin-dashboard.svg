  <text x="258" y="423" font-family="system-ui,sans-serif" font-size="13" fill="#e2e8f0">API key created</text>
  <text x="258" y="439" font-family="system-ui,sans-serif" font-size="11" fill="#4b5563">dave@example.com</text>
