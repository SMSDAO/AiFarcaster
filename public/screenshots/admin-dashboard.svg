  <text x="258" y="166" font-family="system-ui,sans-serif" font-size="11" fill="#10b981">+12% this month</text>
  <rect x="402" y="93" width="36" height="36" rx="18" fill="#1d4ed8" opacity="0.2"/>
  <rect x="411" y="102" width="18" height="18" rx="2" fill="#3b82f6" filter="url(#glow)"/>

