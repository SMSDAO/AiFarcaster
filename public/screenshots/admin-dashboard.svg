  <circle cx="1082" cy="277" r="6" fill="#10b981" filter="url(#glow)"/>
  <text x="1096" y="282" font-family="system-ui,sans-serif" font-size="11" fill="#10b981">operational</text>

  <text x="854" y="324" font-family="system-ui,sans-serif" font-size="13" fill="#d1d5db">Database</text>
  <circle cx="1082" cy="319" r="6" fill="#10b981" filter="url(#glow)"/>
  <text x="1096" y="324" font-family="system-ui,sans-serif" font-size="11" fill="#10b981">operational</text>

  <text x="854" y="366" font-family="system-ui,sans-serif" font-size="13" fill="#d1d5db">Auth</text>
